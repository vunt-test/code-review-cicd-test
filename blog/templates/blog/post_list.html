{% extends "blog/base.html" %}

{% block title %}Posts{% endblock %}

{% block content %}
    <h2>All Posts</h2>
    {% if posts %}
        {% for post in posts %}
            <article>
                <h3><a href="{% url 'post_detail' post.pk %}">{{ post.title }}</a></h3>
                <small>{{ post.created_at|date:"N j, Y" }}</small>
                <p>{{ post.content|truncatewords:30 }}</p>
            </article>
            <hr>
        {% endfor %}
    {% else %}
        <p>No posts yet.</p>
    {% endif %}
{% endblock %}
