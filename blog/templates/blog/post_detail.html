{% extends "blog/base.html" %}

{% block title %}{{ post.title }}{% endblock %}

{% block content %}
    <article>
        <h2>{{ post.title }}</h2>
        <small>{{ post.created_at|date:"N j, Y" }}</small>
        <p>{{ post.content }}</p>
    </article>
    <a href="{% url 'post_list' %}">&larr; Back to all posts</a>
{% endblock %}
